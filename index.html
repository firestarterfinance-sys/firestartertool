<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FIREstarter — Your Free FIRE Planning Tool</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d1a;color:#f0f0f0;font-family:'DM Sans',sans-serif;min-height:100vh}
input[type=range]{-webkit-appearance:none;height:5px;border-radius:99px;background:#1a1a2e;width:100%}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;cursor:pointer;border:2px solid #0d0d1a}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#1a1a2e}
::-webkit-scrollbar-thumb{background:#2d2d4a;border-radius:99px}
table{border-collapse:collapse;width:100%}
a{color:inherit;text-decoration:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useEffect,useRef} = React;
const {AreaChart,Area,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,ReferenceLine,Legend,BarChart,Bar} = Recharts;

const fmt     = n => n>=1e6?`$${(n/1e6).toFixed(2)}M`:n>=1000?`$${(n/1000).toFixed(0)}K`:`$${Math.round(n).toLocaleString()}`;
const fmtFull = n => `$${Math.round(n).toLocaleString()}`;

const HIST={conservative:0.06,moderate:0.08,optimistic:0.10};
const TAX ={conservative:0.22,moderate:0.18,optimistic:0.15};
const COL ={
  lcol: {label:"Low Cost (LCOL)",       mult:0.80,eg:"Rural TX, Midwest, Southeast"},
  mcol: {label:"Medium Cost (MCOL)",    mult:1.00,eg:"Austin suburbs, mid-size cities"},
  hcol: {label:"High Cost (HCOL)",      mult:1.45,eg:"Austin proper, Denver, Seattle"},
  vhcol:{label:"Very High Cost (VHCOL)",mult:2.00,eg:"NYC, SF, LA"},
};
const HC={
  subsidized:  {label:"🟢 ACA Subsidized",  color:"#6ee7b7",single:200, couple:350, family:450, desc:"You manage retirement income (Roth draws, capital-gains harvesting) to stay below subsidy thresholds. Many FIRE households engineer this intentionally.",src:"Healthcare.gov 2024, KFF subsidy calculator"},
  market:      {label:"🟡 Market Rate ACA", color:"#e8c547",single:550, couple:1100,family:1800,desc:"Full ACA marketplace premiums with no subsidies — the safe default for most early retirees who haven't optimized their income.",src:"KFF Health Insurance Marketplace Calculator 2024"},
  conservative:{label:"🔴 Conservative",    color:"#f87171",single:850, couple:1700,family:2500,desc:"Includes rising premiums, dental, vision, and average out-of-pocket costs. Use this if you want the sleep-at-night number.",src:"eHealth Insurance Cost Report 2024"},
};
const BUCKET_PRESETS={
  early: {label:"Retiring before 59½",    sub:"Need a bridge to cover the gap",        ret:55,bro:38,liq:7},
  normal:{label:"Retiring at 59½ or later",sub:"Retirement accounts accessible at FIRE",ret:65,bro:28,liq:7},
  custom:{label:"Custom",                  sub:"Set your own targets",                  ret:null,bro:null,liq:null},
};
const MATH_QA=[
  {q:"Where do the 10% / 8% / 6% return rates come from?",a:"The S&P 500 has returned an average of ~10.5% annually since 1926. We use 10% optimistic, 8% moderate, and 6% conservative. All projections subtract your inflation assumption to show real purchasing power.",src:"Vanguard / CRSP data, 1926–present"},
  {q:"Why subtract inflation from returns?",a:"Real return = nominal return minus inflation. At 3% inflation and 8% nominal, purchasing power grows at ~5%/yr. This makes projections honest about what your money is actually worth in the future.",src:"Federal Reserve historical CPI data"},
  {q:"Why 25x your annual spend as your FIRE number?",a:"Simple math: 100% ÷ 4% = 25. The 4% rule comes from the Trinity Study (1998), which tested portfolio survival over 30-year periods using 1926–1995 data. A 4% withdrawal rate had ~95% success.",src:"Trinity Study, Journal of Financial Planning, 1998"},
  {q:"How is Coast FIRE calculated?",a:"Coast FIRE = Your FIRE Target ÷ (1 + real return)^years until 65. If that number is less than what you have today, your portfolio will grow to your goal by 65 with zero additional contributions.",src:"Standard time-value of money formula"},
  {q:"How does cost of living affect the numbers?",a:"We apply a multiplier to your monthly spend. LCOL (0.80×) means the same lifestyle costs ~20% less. HCOL (1.45×) reflects major metros. These are approximations based on regional cost data.",src:"MIT Living Wage Calculator, BLS Consumer Expenditure Survey"},
];
const STORAGE_KEY="fire_v3";
const DEFAULT={
  age:36,monthly_spend:8000,annual_contribution:48000,
  override_fire_target:false,fire_target:2400000,
  taxable_brokerage:334000,taxable_cash:46000,
  roth_ira:73900,traditional_401k:492000,traditional_ira:1800,
  hsa:0,life_insurance_cv:0,kids_529:8000,
  salary:180000,variable_comp:30000,
  return_scenario:"moderate",withdrawal_rate:4,
  inflation_rate:3,col_tier:"mcol",col_baked_in:true,
  bucket_preset:"early",bucket_ret_pct:55,bucket_bro_pct:38,bucket_liq_pct:7,
  hc_bucket:"market",hc_override:false,hc_custom:1500,family_size:"family",
};
const loadSaved=()=>{try{const r=localStorage.getItem(STORAGE_KEY);return r?{...DEFAULT,...JSON.parse(r)}:DEFAULT;}catch{return DEFAULT;}};

// Primitives
const Card=({children,style={}})=><div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:16,padding:24,...style}}>{children}</div>;
const SLabel=({children,color="#e8c547"})=><div style={{fontSize:11,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color,marginBottom:14,paddingBottom:8,borderBottom:`1px solid ${color}33`}}>{children}</div>;
const StatBox=({label,value,sub,color="#e8c547"})=>(
  <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,padding:"16px 18px"}}>
    <div style={{fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:"#6a6a8a",marginBottom:5}}>{label}</div>
    <div style={{fontSize:22,fontWeight:800,color,fontFamily:"'DM Mono',monospace",lineHeight:1}}>{value}</div>
    {sub&&<div style={{fontSize:11,color:"#5a5a7a",marginTop:4}}>{sub}</div>}
  </div>
);
const PBar=({pct,color,h=8})=>(
  <div style={{height:h,background:"#1a1a2e",borderRadius:99,overflow:"hidden"}}>
    <div style={{height:"100%",width:`${Math.min(100,Math.max(0,pct))}%`,background:color,borderRadius:99,transition:"width 0.5s ease"}}/>
  </div>
);
const Toggle=({on,onChange})=>(
  <div onClick={()=>onChange(!on)} style={{width:32,height:18,borderRadius:99,background:on?"#e8c547":"#2d2d4a",cursor:"pointer",position:"relative",transition:"background 0.2s",flexShrink:0}}>
    <div style={{position:"absolute",top:2,left:on?16:2,width:14,height:14,borderRadius:99,background:"#fff",transition:"left 0.2s"}}/>
  </div>
);
const Field=({label,value,onChange,prefix="$",suffix="",step=1000,note})=>(
  <div style={{marginBottom:13}}>
    <label style={{display:"block",fontSize:11,fontWeight:700,letterSpacing:"0.07em",textTransform:"uppercase",color:"#6a6a8a",marginBottom:4}}>{label}</label>
    {note&&<div style={{fontSize:11,color:"#4a4a6a",marginBottom:4,lineHeight:1.5}}>{note}</div>}
    <div style={{display:"flex",alignItems:"center",background:"#1a1a2e",border:"1px solid #2d2d4a",borderRadius:8,overflow:"hidden"}}>
      {prefix&&<span style={{padding:"8px 10px",color:"#e8c547",fontWeight:700,fontSize:13,borderRight:"1px solid #2d2d4a"}}>{prefix}</span>}
      <input type="number" value={value} step={step} onChange={e=>onChange(Number(e.target.value))} style={{flex:1,background:"transparent",border:"none",outline:"none",color:"#f0f0f0",fontSize:14,fontFamily:"'DM Mono',monospace",padding:"8px 10px"}}/>
      {suffix&&<span style={{padding:"8px 10px",color:"#6a6a8a",fontSize:12}}>{suffix}</span>}
    </div>
  </div>
);
const InfoBox=({color,children})=><div style={{padding:"12px 14px",background:`${color}10`,border:`1px solid ${color}30`,borderRadius:8,fontSize:12,color,lineHeight:1.7,marginTop:10}}>{children}</div>;

function FireDashboard(){
  const [inputs,setInputs]=useState(loadSaved);
  const [activeTab,setTab]=useState(0);
  const [savedFlash,setFlash]=useState(false);
  const [showMath,setMath]=useState(false);
  const saveTimer=useRef(null);

  useEffect(()=>{
    try{localStorage.setItem(STORAGE_KEY,JSON.stringify(inputs));}catch{}
    setFlash(true);clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>setFlash(false),1800);
  },[inputs]);

  const set=k=>v=>setInputs(p=>({...p,[k]:v}));
  const applyPreset=key=>{
    const p=BUCKET_PRESETS[key];
    setInputs(prev=>({...prev,bucket_preset:key,...(p.ret!==null?{bucket_ret_pct:p.ret,bucket_bro_pct:p.bro,bucket_liq_pct:p.liq}:{})}));
  };
  const reset=()=>{if(window.confirm("Reset to example defaults?")){setInputs(DEFAULT);try{localStorage.removeItem(STORAGE_KEY);}catch{}}};

  const c=useMemo(()=>{
    const{age,monthly_spend,annual_contribution,fire_target,override_fire_target,
      taxable_brokerage,taxable_cash,roth_ira,traditional_401k,traditional_ira,hsa,life_insurance_cv,kids_529,
      return_scenario,withdrawal_rate,inflation_rate,col_tier,col_baked_in,
      bucket_ret_pct,bucket_bro_pct,bucket_liq_pct,
      hc_bucket,hc_override,hc_custom,family_size,salary,variable_comp}=inputs;

    const colMult=col_baked_in?1:(COL[col_tier]?.mult||1);
    const inflRate=(inflation_rate||3)/100;
    const adjSpend=monthly_spend*colMult*12;
    const effTarget=override_fire_target?fire_target:Math.round(adjSpend*25/50000)*50000;

    const totalRet=roth_ira+traditional_401k+traditional_ira+hsa;
    const totalBro=taxable_brokerage+life_insurance_cv;
    const totalLiq=taxable_cash;
    const totalAll=totalRet+totalBro+totalLiq+kids_529;

    const rMod=HIST.moderate,rCon=HIST.conservative,rOpt=HIST.optimistic;
    const realMod=Math.max(0.01,rMod-inflRate),realCon=Math.max(0.01,rCon-inflRate),realOpt=Math.max(0.01,rOpt-inflRate);
    const pct=Math.min(100,(totalAll/effTarget)*100);
    const gap=Math.max(0,effTarget-totalAll);

    const yrsTo=(target,rate,contrib)=>{if(totalAll>=target)return 0;let b=totalAll;for(let y=0;y<=50;y++){if(b>=target)return y;b=b*(1+rate)+contrib;}return 50;};
    const yBase=yrsTo(effTarget,realMod,annual_contribution);
    const yCon=yrsTo(effTarget,realCon,annual_contribution);
    const yOpt=yrsTo(effTarget,realOpt,annual_contribution);
    const fireYear=new Date().getFullYear()+yBase;
    const fireAge=age+yBase;

    const growthData=[];let bB=totalAll,bC=totalAll,bO=totalAll;const yr=new Date().getFullYear();
    for(let y=0;y<=Math.max(yCon+3,30);y++){
      growthData.push({year:yr+y,age:age+y,base:Math.round(bB),conservative:Math.round(bC),optimistic:Math.round(bO)});
      bB=bB*(1+realMod)+annual_contribution;bC=bC*(1+realCon)+annual_contribution;bO=bO*(1+realOpt)+annual_contribution;
    }

    const coastNum=effTarget/Math.pow(1+realMod,Math.max(0,65-age));
    const isCoast=totalAll>=coastNum;
    const coastPct=Math.min(100,(totalAll/coastNum)*100);
    const retTarget=effTarget*(bucket_ret_pct/100);
    const broTarget=effTarget*(bucket_bro_pct/100);
    const liqTarget=effTarget*(bucket_liq_pct/100);

    const hcBkt=HC[hc_bucket]||HC.market;
    const hcMo=hc_override?hc_custom:(hcBkt[family_size]||hcBkt.family);
    const yrsToMed=Math.max(0,65-fireAge);
    const hcTotal=hcMo*12*yrsToMed;
    const hcReserve=hcTotal;
    const fullTarget=effTarget+hcReserve;
    const fullPct=Math.min(100,(totalAll/fullTarget)*100);
    const fullGap=Math.max(0,fullTarget-totalAll);

    const taxRate=TAX[return_scenario];
    const wdData=[3,3.5,4,4.5,5].map(r=>{const g=effTarget*(r/100);const n=g*(1-taxRate);return{rate:`${r}%`,gross:Math.round(g),net:Math.round(n),monthly:Math.round(n/12)};});

    const totalIncome=(salary||0)+(variable_comp||0);
    const savingsRate=totalIncome>0?Math.min(100,Math.round((annual_contribution/totalIncome)*100)):0;
    const savingsColor=savingsRate>=50?"#e8c547":savingsRate>=25?"#6ee7b7":savingsRate>=15?"#f97316":"#f87171";
    const savingsLabel=savingsRate>=50?"Excellent — well above benchmark":savingsRate>=25?"On track — meets FIRE benchmark":savingsRate>=15?"Below benchmark — aim for 25%+":"Low — consider increasing contributions";

    const contribImpact=[0,250,500,1000,2000].map(extra=>{
      const annualExtra=annual_contribution+(extra*12);
      const yrs=yrsTo(effTarget,realMod,annualExtra);
      const yearsSaved=Math.max(0,yBase-yrs);
      return{extra,fireYear:new Date().getFullYear()+yrs,fireAge:age+yrs,yrs,yearsSaved};
    });

    return{totalAll,totalRet,totalBro,totalLiq,effTarget,pct,gap,
      yBase,yCon,yOpt,fireYear,fireAge,growthData,
      coastNum,isCoast,coastPct,retTarget,broTarget,liqTarget,
      hcMo,hcTotal,hcReserve,fullTarget,fullPct,fullGap,yrsToMed,wdData,taxRate,contribImpact,
      rMod,rCon,rOpt,realMod,inflRate,colMult,savingsRate,savingsColor,savingsLabel,totalIncome};
  },[inputs]);

  const TABS=[
    {label:"Portfolio",group:"picture"},
    {label:"FIRE Projection",group:"picture"},
    {label:"Healthcare",group:"deeper"},
    {label:"Withdrawal",group:"deeper"},
    {label:"Cheat Sheet",group:"deeper"},
  ];

  const renderTab=()=>{
    switch(activeTab){
      case 0:return(
        <div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14,marginBottom:20}}>
            <StatBox label="Total Portfolio" value={fmt(c.totalAll)} color="#e8c547"/>
            <StatBox label="Retirement Accounts" value={fmt(c.totalRet)} sub="401k · Roth · IRA · HSA" color="#a78bfa"/>
            <StatBox label="Brokerage + Cash" value={fmt(c.totalBro+c.totalLiq)} sub="Accessible before 59½" color="#4ecdc4"/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
            <Card>
              <SLabel>Taxable Accounts</SLabel>
              {[
                {label:"Brokerage",val:inputs.taxable_brokerage,color:"#4ecdc4",sub:"Accessible anytime — taxable gains"},
                {label:"Cash / Savings",val:inputs.taxable_cash,color:"#67e8f9",sub:"Fully liquid, FDIC protected"},
                {label:"Life Ins. Cash Val",val:inputs.life_insurance_cv,color:"#f97316",sub:"Via policy loan"},
              ].map(({label,val,color,sub})=>(
                <div key={label} style={{marginBottom:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                    <span style={{fontSize:13,color:"#ccc"}}>{label}</span>
                    <span style={{fontSize:13,fontWeight:700,color,fontFamily:"'DM Mono',monospace"}}>{fmtFull(val)}</span>
                  </div>
                  <div style={{fontSize:11,color:"#5a5a7a",marginBottom:5}}>{sub}</div>
                  <PBar pct={c.totalAll>0?(val/c.totalAll)*100:0} color={color}/>
                </div>
              ))}
            </Card>
            <Card>
              <SLabel>Tax-Advantaged Accounts</SLabel>
              {[
                {label:"401(k)",val:inputs.traditional_401k,color:"#a78bfa",sub:"Pre-tax, penalty-free at 59½"},
                {label:"Roth IRA",val:inputs.roth_ira,color:"#c084fc",sub:"After-tax, tax-free growth"},
                {label:"Traditional IRA",val:inputs.traditional_ira,color:"#818cf8",sub:"Pre-tax, penalty-free at 59½"},
                {label:"HSA",val:inputs.hsa,color:"#6ee7b7",sub:"Triple tax-advantaged"},
              ].map(({label,val,color,sub})=>(
                <div key={label} style={{marginBottom:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                    <span style={{fontSize:13,color:"#ccc"}}>{label}</span>
                    <span style={{fontSize:13,fontWeight:700,color,fontFamily:"'DM Mono',monospace"}}>{fmtFull(val)}</span>
                  </div>
                  <div style={{fontSize:11,color:"#5a5a7a",marginBottom:5}}>{sub}</div>
                  <PBar pct={c.totalAll>0?(val/c.totalAll)*100:0} color={color}/>
                </div>
              ))}
            </Card>
          </div>
          <Card>
            <SLabel>Kids &amp; Other</SLabel>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <span style={{fontSize:13,color:"#ccc"}}>529 Education</span>
              <span style={{fontSize:13,fontWeight:700,color:"#fbbf24",fontFamily:"'DM Mono',monospace"}}>{fmtFull(inputs.kids_529)}</span>
            </div>
            <div style={{fontSize:11,color:"#5a5a7a"}}>Education-restricted. Not counted toward your FIRE number.</div>
          </Card>
        </div>
      );

      case 1:return(
        <div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:12,marginBottom:20}}>
            <StatBox label="FIRE Target" value={fmt(c.effTarget)} color="#e8c547"/>
            <StatBox label="Current Portfolio" value={fmt(c.totalAll)} color="#4ecdc4"/>
            <StatBox label="Gap to FIRE" value={fmt(c.gap)} color={c.gap===0?"#6ee7b7":"#f87171"} sub={`${(c.inflRate*100).toFixed(0)}% inflation adj.`}/>
            <StatBox label="% to Target" value={`${c.pct.toFixed(1)}%`} color="#a78bfa"/>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:10}}>
            {[
              {label:"Optimistic",rate:c.rOpt,yrs:c.yOpt,color:"#6ee7b7"},
              {label:"Base (8%)",rate:c.rMod,yrs:c.yBase,color:"#e8c547",big:true},
              {label:"Conservative",rate:c.rCon,yrs:c.yCon,color:"#f87171"},
            ].map(({label,rate,yrs,color,big})=>(
              <Card key={label} style={{textAlign:"center",borderTop:`2px solid ${color}`}}>
                <div style={{fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color,marginBottom:8}}>{label} ({(rate*100).toFixed(0)}%)</div>
                <div style={{fontSize:big?34:26,fontWeight:800,color,fontFamily:"'DM Mono',monospace"}}>{new Date().getFullYear()+yrs}</div>
                <div style={{fontSize:12,color:"#8a8a8a",marginTop:4}}>Age {inputs.age+yrs} · {yrs} years</div>
              </Card>
            ))}
          </div>

          <div style={{marginBottom:20}}>
            <button onClick={()=>setMath(m=>!m)} style={{display:"flex",alignItems:"center",gap:8,background:"transparent",border:"1px solid rgba(255,255,255,0.07)",borderRadius:8,padding:"7px 13px",cursor:"pointer",color:"#5a5a7a",fontSize:12,fontFamily:"'DM Sans',sans-serif"}}>
              <span>{showMath?"▾":"▸"}</span><span>{showMath?"Hide":"How did we calculate this?"}</span>
            </button>
            {showMath&&(
              <div style={{marginTop:10,background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:12,overflow:"hidden"}}>
                {MATH_QA.map((item,i)=>(
                  <div key={i} style={{padding:"14px 18px",borderBottom:i<MATH_QA.length-1?"1px solid rgba(255,255,255,0.04)":"none"}}>
                    <div style={{fontSize:13,fontWeight:700,color:"#f0f0f0",marginBottom:5}}>{item.q}</div>
                    <div style={{fontSize:12,color:"#8a8a8a",lineHeight:1.7,marginBottom:5}}>{item.a}</div>
                    <div style={{fontSize:11,color:"#4a4a6a",fontStyle:"italic"}}>📚 {item.src}</div>
                  </div>
                ))}
                <div style={{padding:"10px 18px",background:"rgba(232,197,71,0.04)",borderTop:"1px solid rgba(232,197,71,0.1)",fontSize:11,color:"#5a5a7a"}}>Past performance does not guarantee future results. Use the scenario toggles to stress-test your assumptions.</div>
              </div>
            )}
          </div>

          <Card style={{marginBottom:16}}>
            <SLabel>📈 Contribution Impact</SLabel>
            <div style={{fontSize:12,color:"#6a6a8a",marginBottom:16,lineHeight:1.7}}>
              You're currently contributing <strong style={{color:"#f0f0f0"}}>{fmtFull(inputs.annual_contribution)}/yr</strong>. See what adding a little more does to your FIRE date — every dollar compounds over time.
            </div>
            <div style={{overflowX:"auto"}}>
              <table>
                <thead>
                  <tr>{["Extra / month","Total annual","FIRE year","Your age","Years saved"].map(h=>(
                    <th key={h} style={{textAlign:"left",fontSize:10,fontWeight:700,letterSpacing:"0.07em",textTransform:"uppercase",color:"#5a5a7a",padding:"8px 10px",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>{h}</th>
                  ))}</tr>
                </thead>
                <tbody>
                  {c.contribImpact.map((row,i)=>{
                    const isCurrent=row.extra===0;
                    const color=isCurrent?"#e8c547":row.yearsSaved>=3?"#6ee7b7":row.yearsSaved>=1?"#4ecdc4":"#8a8a8a";
                    return(
                      <tr key={i} style={{background:isCurrent?"rgba(232,197,71,0.06)":"transparent"}}>
                        <td style={{padding:"11px 10px",fontFamily:"'DM Mono',monospace",fontWeight:isCurrent?800:600,color:isCurrent?"#e8c547":"#f0f0f0",fontSize:13}}>{isCurrent?"Current":`+ ${fmtFull(row.extra)}/mo`}</td>
                        <td style={{padding:"11px 10px",color:"#8a8a8a",fontFamily:"'DM Mono',monospace",fontSize:12}}>{fmtFull(inputs.annual_contribution+row.extra*12)}/yr</td>
                        <td style={{padding:"11px 10px",fontWeight:700,color,fontFamily:"'DM Mono',monospace",fontSize:13}}>{row.fireYear}</td>
                        <td style={{padding:"11px 10px",color:"#8a8a8a",fontSize:12}}>Age {row.fireAge}</td>
                        <td style={{padding:"11px 10px",fontSize:12}}>{isCurrent?<span style={{color:"#5a5a7a"}}>—</span>:row.yearsSaved>0?<span style={{color,fontWeight:700}}>↑ {row.yearsSaved} yr{row.yearsSaved!==1?"s":""} earlier</span>:<span style={{color:"#5a5a7a"}}>no change</span>}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>

                ))}

              <InfoBox color="#4ecdc4"><strong>Key insight:</strong> Healthcare ends at 65 when Medicare begins — it's temporary. You need {c.yrsToMed} years × {fmtFull(hcMo*12)}/yr = <strong>{fmt(c.hcTotal)} total</strong>. You don't need to 25× this. Consider keeping this amount in a conservative, separate account — not your growth portfolio.</InfoBox>
            </Card>
            <div style={{padding:"10px 14px",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:8,fontSize:11,color:"#4a4a6a",lineHeight:1.6}}>📚 Sources: KFF Health Insurance Marketplace Calculator, Healthcare.gov 2024, eHealth Insurance Cost Report 2024. Estimates vary by state, age, and plan tier. Texas has specific ACA considerations.</div>
          </div>
        );
      }

      case 3:{
        const hcBkt=HC[inputs.hc_bucket]||HC.market;
        const hcMo=inputs.hc_override?inputs.hc_custom:(hcBkt[inputs.family_size]||hcBkt.family);
        const gross=c.effTarget*(inputs.withdrawal_rate/100);
        const net=gross*(1-c.taxRate);
        const mo=net/12;
        return(
          <div>
            <div style={{marginBottom:16,padding:"12px 16px",background:"rgba(232,197,71,0.08)",border:"1px solid rgba(232,197,71,0.2)",borderRadius:10,fontSize:13,color:"#d4b84a"}}>
              💡 The 4% rule means withdrawing 4% of your portfolio annually. Historically ~95% success rate over 30 years. Taxes vary by which accounts you pull from — these use estimated blended rates.
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:16}}>
              <StatBox label="At FIRE Target" value={fmt(c.effTarget)} color="#e8c547"/>
              <StatBox label={`Annual at ${inputs.withdrawal_rate}%`} value={fmt(gross)} color="#4ecdc4"/>
              <StatBox label="Monthly (after tax)" value={fmt(mo)} sub={`~${(c.taxRate*100).toFixed(0)}% blended rate`} color="#a78bfa"/>
            </div>
            <Card style={{marginBottom:16,borderLeft:"3px solid #f87171"}}>
              <SLabel color="#f87171">Healthcare — Separate Line Item</SLabel>
              <div style={{fontSize:12,color:"#6a6a8a",marginBottom:14,lineHeight:1.6}}>Your insurance cost before Medicare comes out of your monthly withdrawal. Shown separately so you can see exactly what you're left with.</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10,marginBottom:10}}>
                {[
                  {label:"HC Scenario",value:inputs.hc_bucket.charAt(0).toUpperCase()+inputs.hc_bucket.slice(1),color:"#f87171"},
                  {label:"HC Monthly Cost",value:fmtFull(hcMo),color:"#f87171"},
                  {label:"Monthly After HC",value:fmtFull(mo-hcMo),color:mo-hcMo>0?"#6ee7b7":"#f87171"},
                  {label:"After 65 (Medicare)",value:fmtFull(mo),color:"#6ee7b7"},
                ].map(({label,value,color})=>(
                  <div key={label} style={{background:"#1a1a2e",borderRadius:8,padding:"10px 12px"}}>
                    <div style={{fontSize:10,color:"#5a5a7a",marginBottom:3,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em"}}>{label}</div>
                    <div style={{fontSize:14,fontWeight:800,color,fontFamily:"'DM Mono',monospace"}}>{value}</div>
                  </div>
                ))}
              </div>
              <div style={{fontSize:11,color:"#5a5a7a",lineHeight:1.6}}>Once you hit 65 and Medicare kicks in, this cost largely disappears and your full monthly withdrawal becomes available. Configure your scenario in the <button onClick={()=>setTab(2)} style={{color:"#f87171",background:"none",border:"none",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:11,fontWeight:700,padding:0}}>Healthcare tab</button>.</div>
            </Card>
            <Card style={{marginBottom:16}}>
              <SLabel>Withdrawal Rate Scenarios</SLabel>
              <div style={{overflowX:"auto"}}>
                <table>
                  <thead><tr>{["Rate","Annual Gross","Est. Tax","Annual Net","Monthly Net"].map(h=><th key={h} style={{textAlign:"left",fontSize:10,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:"#5a5a7a",padding:"8px 10px",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>{h}</th>)}</tr></thead>
                  <tbody>
                    {c.wdData.map(row=>(
                      <tr key={row.rate} style={{background:row.rate===`${inputs.withdrawal_rate}%`?"rgba(232,197,71,0.06)":"transparent"}}>
                        <td style={{padding:"11px 10px",color:row.rate===`${inputs.withdrawal_rate}%`?"#e8c547":"#f0f0f0",fontWeight:800,fontFamily:"'DM Mono',monospace"}}>{row.rate}</td>
                        <td style={{padding:"11px 10px",color:"#4ecdc4",fontFamily:"'DM Mono',monospace"}}>{fmtFull(row.gross)}</td>
                        <td style={{padding:"11px 10px",color:"#6a6a8a"}}>{(c.taxRate*100).toFixed(0)}%</td>
                        <td style={{padding:"11px 10px",color:"#a78bfa",fontFamily:"'DM Mono',monospace"}}>{fmtFull(row.net)}</td>
                        <td style={{padding:"11px 10px",color:"#6ee7b7",fontFamily:"'DM Mono',monospace",fontWeight:700}}>{fmtFull(row.monthly)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <div style={{marginTop:10,fontSize:11,color:"#4a4a6a",lineHeight:1.6}}>Tax rates are estimated blended rates. Roth = 0%, brokerage = capital gains, traditional = ordinary income. Withdrawal sequencing is one of the most valuable things a CFP helps with.</div>
            </Card>
            <Card>
              <SLabel>Gross vs. Net by Withdrawal Rate</SLabel>
              <ResponsiveContainer width="100%" height={200}>
                <BarChart data={c.wdData} margin={{top:5,right:10,left:10,bottom:5}}>
                  <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)"/>
                  <XAxis dataKey="rate" stroke="#4a4a6a" tick={{fill:"#5a5a7a",fontSize:12}}/>
                  <YAxis stroke="#4a4a6a" tick={{fill:"#5a5a7a",fontSize:11}} tickFormatter={v=>fmt(v)}/>
                  <Tooltip formatter={v=>fmtFull(v)} contentStyle={{background:"#1a1a2e",border:"1px solid #2d2d4a",borderRadius:8,color:"#f0f0f0"}}/>
                  <Bar dataKey="gross" fill="#4ecdc4" opacity={0.6} name="Gross" radius={[4,4,0,0]}/>
                  <Bar dataKey="net" fill="#a78bfa" name="Net (after tax)" radius={[4,4,0,0]}/>
                  <Legend wrapperStyle={{color:"#8a8a8a",fontSize:12}}/>
                </BarChart>
              </ResponsiveContainer>
            </Card>
          </div>
        );
      }

      case 4:{
        const sections=[
          {emoji:"🏦",title:"Account Types — What You Actually Have",color:"#4ecdc4",items:[
            {label:"Brokerage (Taxable)",tag:"Anytime",tc:"#4ecdc4",body:"Money invested after taxes. Withdraw anytime — no penalties, no age restrictions. Short-term gains (held <1yr) taxed as ordinary income; long-term (held 1+yr) at lower capital gains rate. Your bridge before 59½."},
            {label:"Cash / Savings",tag:"Fully Liquid",tc:"#67e8f9",body:"Fully liquid. FDIC insured up to $250k per bank. HYSAs paying 4–5%. Your emergency fund — 3–6 months of expenses. Not a growth vehicle, just your safety net."},
            {label:"401(k) Traditional",tag:"Age 59½+",tc:"#a78bfa",body:"Pre-tax contributions — you owe ordinary income tax on the way out. 10% penalty before 59½ (with exceptions). Required Minimum Distributions start at age 73."},
            {label:"Roth IRA",tag:"Most Flexible",tc:"#c084fc",body:"After-tax contributions — growth and withdrawals are 100% tax-free. Contributions (not earnings) can be withdrawn anytime penalty-free. No RMDs ever. One of the most powerful accounts you can have."},
            {label:"Traditional IRA",tag:"Age 59½+",tc:"#818cf8",body:"Like a 401k — pre-tax, taxed on withdrawal. Backdoor Roth: contribute here then convert to Roth if income is too high for direct contributions."},
            {label:"HSA",tag:"Triple Tax",tc:"#6ee7b7",body:"Most tax-efficient account that exists. Pre-tax in, tax-free growth, tax-free out for medical. After 65, use for anything (pay ordinary income tax). Pro move: pay medical out of pocket now, let HSA compound, reimburse yourself decades later."},
            {label:"529 (Kids Education)",tag:"Restricted",tc:"#fbbf24",body:"Tax-free growth for qualified education. As of 2024, after 15 years you can roll up to $35k into a Roth IRA for the beneficiary. Non-education withdrawals = tax + 10% penalty on earnings only."},
            {label:"Life Ins. Cash Value",tag:"Accessible",tc:"#f97316",body:"If you convert term to permanent, cash value builds and can be borrowed against — no credit check, no approval, no required repayment. Interest goes to the insurer. No federal cap like the 401k's $50k loan limit."},
          ]},
          {emoji:"💸",title:"Withdrawal Sequencing — The Order Matters",color:"#e8c547",items:[
            {label:"Why order matters",tag:"Key Concept",tc:"#e8c547",body:"Pulling from the wrong accounts costs tens of thousands in unnecessary taxes. Goal: manage taxable income each year — stay in lower brackets, minimize lifetime taxes paid."},
            {label:"Recommended order",tag:"The Strategy",tc:"#e8c547",body:"1️⃣ RMDs (no choice). 2️⃣ Taxable brokerage (long-term gains taxed lower). 3️⃣ Traditional/pre-tax (fill lower brackets). 4️⃣ Roth last — grows tax-free forever."},
            {label:"Roth = 0% withdrawal",tag:"Tax-Free",tc:"#c084fc",body:"Roth withdrawals don't count as income. Doesn't push you into higher brackets, doesn't affect Medicare premiums, doesn't increase how much Social Security gets taxed. Huge deal in retirement."},
            {label:"Brokerage = cap gains",tag:"Lower Rate",tc:"#4ecdc4",body:"Gains held 1+ year taxed at 0%, 15%, or 20% — not ordinary income rate. Married couples can realize ~$94k in long-term gains at 0% if income is managed low enough."},
            {label:"Traditional = ordinary income",tag:"Higher Rate",tc:"#f87171",body:"Every dollar from 401k or traditional IRA taxed like a paycheck. Draw just enough to fill your current bracket (12% or 22%), then pull the rest from Roth or brokerage."},
            {label:"Sequence of Returns Risk",tag:"The Big Risk",tc:"#f97316",body:"Retiring right before a crash is dangerous. Selling at a low permanently shrinks your recovery base. Solution: keep 1–2 years of expenses in cash so you never sell investments during a downturn."},
          ]},
          {emoji:"🔥",title:"FIRE Concepts — Plain English",color:"#f97316",items:[
            {label:"What is FIRE?",tag:"The Goal",tc:"#f97316",body:"Financial Independence, Retire Early. FI means investments generate enough passive income to cover expenses indefinitely — whether you work or not. The 'retire early' part is optional. The point is having the choice."},
            {label:"The 4% Rule",tag:"Safe Withdrawal",tc:"#e8c547",body:"Withdraw 4% annually → ~95% chance of not running out over 30 years (Trinity Study, 1998). Your FIRE number = annual expenses × 25. A rule of thumb, not a guarantee."},
            {label:"Why 25x?",tag:"The Math",tc:"#e8c547",body:"1 ÷ 4% = 25. With 25x annual spending invested, withdrawing 4%/yr sustains the portfolio based on historical returns. Targeting 40+ year retirement? Use 3–3.5% instead → 28–33x expenses."},
            {label:"Lean / Fat / Coast FIRE",tag:"Flavors",tc:"#6ee7b7",body:"Lean FIRE = tight budget (~$40k/yr). Fat FIRE = generous lifestyle ($150k+/yr). Barista FIRE = FI but still doing part-time work. Coast FIRE = saved enough to stop contributing and still hit goal by 65."},
            {label:"Backdoor Roth IRA",tag:"High Income",tc:"#c084fc",body:"Income too high for direct Roth? Contribute to a non-deductible Traditional IRA and immediately convert to Roth. Legal at any income level. Watch the pro-rata rule if you have other pre-tax IRA money."},
            {label:"Variable Income Planning",tag:"Your Situation",tc:"#4ecdc4",body:"When income varies (bonuses, RSUs, comp), model contributions conservatively using base salary only. Variable comp is a boost when it comes. Prevents overextending on income that might not materialize."},
          ]},
          {emoji:"📋",title:"Life Insurance — What We Covered",color:"#a78bfa",items:[
            {label:"Term vs. Permanent",tag:"Key Diff",tc:"#a78bfa",body:"Term = pure death benefit for a fixed period. No cash value. Cheaper. Permanent = death benefit that never expires + cash value that grows. More expensive but does more."},
            {label:"Conversion Window",tag:"Before Year 10",tc:"#f87171",body:"Many term policies can be converted before your 10th policy anniversary or age 70. No new medical exam. Cash value starts from zero on conversion date — your term years don't create retroactive value."},
            {label:"Conversion Credit",tag:"Year 1–5 Bonus",tc:"#e8c547",body:"Convert within first 5 policy years: 125% of first-year premium as credit. After year 5: 100%. Real incentive to act before year 5 if you're converting at all."},
            {label:"Policy Loans",tag:"How It Works",tc:"#6ee7b7",body:"Borrow against cash value — no credit check, no approval, no repayment schedule required. Interest accrues to the insurer. No federal borrowing cap unlike 401k's $50k limit."},
            {label:"Policy Loan Risk",tag:"Watch Out",tc:"#f87171",body:"Unmanaged interest compounds. If the loan grows larger than your cash value, the policy lapses — entire loan balance becomes taxable income immediately. Useful tool, needs attention."},
            {label:"Real Reasons to Convert",tag:"Not Just Loans",tc:"#a78bfa",body:"Lock in insurability permanently while healthy. Permanent death benefit for estate/legacy planning. Tax-deferred cash value growth as supplemental savings. The loan feature is a bonus, not the headline reason."},
          ]},
          {emoji:"📏",title:"Key Rules & Limits to Know",color:"#6ee7b7",items:[
            {label:"401(k) Loan Cap",tag:"$50k Federal",tc:"#f87171",body:"Borrow the lesser of $50,000 or 50% of vested balance. Repaid with after-tax dollars that get taxed again at withdrawal. The 'paying yourself interest' framing is rosier than reality."},
            {label:"401(k) Contribution Limit",tag:"$23,000 (2024)",tc:"#a78bfa",body:"$23,000/year employee contribution ($30,500 if 50+). Employer match doesn't count against your limit. Always contribute enough to capture the full employer match — it's an instant 50–100% return."},
            {label:"Roth IRA Income Limit",tag:"Phases Out",tc:"#c084fc",body:"Direct contributions phase out at $146k–$161k single / $230k–$240k married (2024). Above that: Backdoor Roth. Contribution limit $7,000/year ($8,000 if 50+), shared across all IRAs."},
            {label:"Penalty-Free Age",tag:"59½",tc:"#e8c547",body:"Most retirement accounts allow penalty-free withdrawals at 59½. Before that: 10% penalty plus income tax. Exceptions include disability, substantially equal periodic payments (Rule 72t), and more."},
            {label:"RMD Start Age",tag:"73",tc:"#f97316",body:"Required Minimum Distributions from traditional 401ks and IRAs begin at age 73. Roth IRAs have NO RMDs — they grow tax-free your entire life and pass to heirs without forced withdrawal."},
            {label:"HSA Contribution Limit",tag:"$8,300 Family",tc:"#6ee7b7",body:"$4,150 individual / $8,300 family (2024). Must be enrolled in a High Deductible Health Plan. Unused funds roll over forever — no 'use it or lose it' like an FSA."},
          ]},
        ];
        return(
          <div>
            {sections.map(section=>(
              <Card key={section.title} style={{marginBottom:20,borderLeft:`3px solid ${section.color}`}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18,paddingBottom:12,borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
                  <span style={{fontSize:18}}>{section.emoji}</span>
                  <span style={{fontSize:14,fontWeight:800,color:section.color}}>{section.title}</span>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                  {section.items.map(item=>(
                    <div key={item.label} style={{background:"#1a1a2e",borderRadius:10,padding:14}}>
                      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8,marginBottom:7}}>
                        <div style={{fontSize:12,fontWeight:800,color:"#f0f0f0",lineHeight:1.3}}>{item.label}</div>
                        <div style={{flexShrink:0,fontSize:10,fontWeight:700,letterSpacing:"0.05em",textTransform:"uppercase",color:item.tc,background:`${item.tc}18`,border:`1px solid ${item.tc}40`,borderRadius:99,padding:"2px 7px",whiteSpace:"nowrap"}}>{item.tag}</div>
                      </div>
                      <div style={{fontSize:12,color:"#8a8a8a",lineHeight:1.65}}>{item.body}</div>
                    </div>
                  ))}
                </div>
              </Card>
            ))}
            <div style={{padding:"10px 14px",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:8,fontSize:11,color:"#4a4a6a",textAlign:"center"}}>Your plain-English reference — not a substitute for a CPA or CFP for your specific situation.</div>
          </div>
        );
      }
      default:return null;
    }
  };

  return(
    <div style={{minHeight:"100vh",background:"#0d0d1a",color:"#f0f0f0",fontFamily:"'DM Sans',sans-serif"}}>
      <div style={{maxWidth:1120,margin:"0 auto",padding:"0 20px"}}>
        <div style={{padding:"26px 0 20px",borderBottom:"1px solid rgba(255,255,255,0.06)",marginBottom:24,display:"flex",justifyContent:"space-between",alignItems:"flex-end",flexWrap:"wrap",gap:12}}>
          <div>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.18em",textTransform:"uppercase",color:"#e8c547",marginBottom:6}}>🔥 FIREstarter</div>
            <h1 style={{margin:0,fontSize:24,fontWeight:800,color:"#f0f0f0",lineHeight:1}}>Your FIRE Picture</h1>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:26,fontWeight:800,color:"#e8c547",fontFamily:"'DM Mono',monospace",marginBottom:5}}>{fmt(c.totalAll)}</div>
            <div style={{fontSize:11,color:savedFlash?"#6ee7b7":"#3a3a5a",transition:"color 0.3s",display:"flex",alignItems:"center",justifyContent:"flex-end",gap:5}}>
              <span>{savedFlash?"✓":"○"}</span><span>{savedFlash?"Saved":"Auto-saves as you type"}</span>
            </div>
          </div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"250px 1fr",gap:24}}>
          <div style={{position:"sticky",top:20,maxHeight:"calc(100vh - 40px)",overflowY:"auto",paddingRight:4}}>
            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              <Card>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
                  <div style={{width:20,height:20,borderRadius:99,background:"#e8c547",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:"#0d0d1a",flexShrink:0}}>1</div>
                  <span style={{fontSize:11,fontWeight:800,color:"#e8c547",letterSpacing:"0.06em",textTransform:"uppercase"}}>Your Spend</span>
                </div>
                <div style={{padding:"12px 14px",background:"rgba(232,197,71,0.06)",border:"1px solid rgba(232,197,71,0.2)",borderRadius:10,marginBottom:12}}>
                  <div style={{fontSize:11,color:"#5a5a7a",marginBottom:8,lineHeight:1.5}}>What does your household spend per month? Everything flows from this.</div>
                  <div style={{display:"flex",alignItems:"center",background:"#1a1a2e",border:"1px solid #2d2d4a",borderRadius:8,overflow:"hidden",marginBottom:10}}>
                    <span style={{padding:"8px 10px",color:"#e8c547",fontWeight:700,fontSize:12,borderRight:"1px solid #2d2d4a"}}>$</span>
                    <input type="number" value={inputs.monthly_spend} step={500} onChange={e=>{const v=Number(e.target.value);set("monthly_spend")(v);if(!inputs.override_fire_target)set("fire_target")(Math.round(v*12*25/50000)*50000);}} style={{flex:1,background:"transparent",border:"none",outline:"none",color:"#f0f0f0",fontSize:13,fontFamily:"'DM Mono',monospace",padding:"8px 10px"}}/>
                    <span style={{padding:"8px 10px",color:"#6a6a8a",fontSize:11}}>/mo</span>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:10}}>
                    <div style={{background:"#0d0d1a",borderRadius:7,padding:"7px 9px"}}><div style={{fontSize:10,color:"#5a5a7a",marginBottom:2}}>Annual</div><div style={{fontSize:12,fontWeight:700,color:"#f0f0f0",fontFamily:"'DM Mono',monospace"}}>{fmtFull(inputs.monthly_spend*12)}</div></div>
                    <div style={{background:"#0d0d1a",borderRadius:7,padding:"7px 9px"}}><div style={{fontSize:10,color:"#5a5a7a",marginBottom:2}}>FIRE # (25×)</div><div style={{fontSize:12,fontWeight:700,color:"#e8c547",fontFamily:"'DM Mono',monospace"}}>{fmt(inputs.monthly_spend*12*25)}</div></div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <Toggle on={inputs.override_fire_target} onChange={v=>set("override_fire_target")(v)}/>
                    <span style={{fontSize:11,color:"#5a5a7a"}}>Override target manually</span>
                  </div>
                  {inputs.override_fire_target&&<div style={{marginTop:10}}><Field label="Custom FIRE Target" value={inputs.fire_target} onChange={set("fire_target")} step={50000}/></div>}
                </div>
                <Field label="Your Age" value={inputs.age} onChange={set("age")} prefix="🎂" step={1}/>
                <Field label="Annual Salary" value={inputs.salary} onChange={set("salary")}/>
                <Field label="Variable / Bonus Comp" value={inputs.variable_comp} onChange={set("variable_comp")} note="RSUs, bonuses — use a conservative estimate"/>
                <Field label="Annual Contribution" value={inputs.annual_contribution} onChange={set("annual_contribution")} note="Total added across all accounts/yr"/>
                <div style={{marginTop:4,padding:"10px 12px",background:"#1a1a2e",borderRadius:8}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#6a6a8a",marginBottom:4}}>Savings Rate</div>
                  <div style={{fontSize:22,fontWeight:800,color:c.savingsColor,fontFamily:"'DM Mono',monospace",lineHeight:1,marginBottom:4}}>{c.savingsRate}%</div>
                  <div style={{fontSize:10,color:c.savingsColor,lineHeight:1.4}}>{c.savingsLabel}</div>
                  <div style={{fontSize:10,color:"#4a4a6a",marginTop:4}}>Benchmark: 25–50%</div>
                </div>
              </Card>

              <Card>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
                  <div style={{width:20,height:20,borderRadius:99,background:"#4ecdc4",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:"#0d0d1a",flexShrink:0}}>2</div>
                  <span style={{fontSize:11,fontWeight:800,color:"#4ecdc4",letterSpacing:"0.06em",textTransform:"uppercase"}}>Your Accounts</span>
                </div>
                <div style={{fontSize:11,color:"#5a5a7a",marginBottom:12,lineHeight:1.5}}>Rough totals are fine to start.</div>
                <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.07em",textTransform:"uppercase",color:"#a78bfa",marginBottom:8}}>Retirement</div>
                <Field label="401(k)" value={inputs.traditional_401k} onChange={set("traditional_401k")}/>
                <Field label="Roth IRA" value={inputs.roth_ira} onChange={set("roth_ira")}/>
                <Field label="Traditional IRA" value={inputs.traditional_ira} onChange={set("traditional_ira")}/>
                <Field label="HSA" value={inputs.hsa} onChange={set("hsa")}/>
                <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.07em",textTransform:"uppercase",color:"#4ecdc4",margin:"10px 0 8px"}}>Brokerage</div>
                <Field label="Taxable Brokerage" value={inputs.taxable_brokerage} onChange={set("taxable_brokerage")}/>
                <Field label="Life Ins. Cash Value" value={inputs.life_insurance_cv} onChange={set("life_insurance_cv")}/>
                <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.07em",textTransform:"uppercase",color:"#67e8f9",margin:"10px 0 8px"}}>Cash &amp; Other</div>
                <Field label="Cash / Savings" value={inputs.taxable_cash} onChange={set("taxable_cash")}/>
                <Field label="529 (Kids)" value={inputs.kids_529} onChange={set("kids_529")}/>
              </Card>

              <Card>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
                  <div style={{width:20,height:20,borderRadius:99,background:"#a78bfa",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:"#0d0d1a",flexShrink:0}}>3</div>
                  <span style={{fontSize:11,fontWeight:800,color:"#a78bfa",letterSpacing:"0.06em",textTransform:"uppercase"}}>Assumptions</span>
                </div>
                <div style={{marginBottom:14}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#6a6a8a",letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:4}}>Cost of Living</div>
                  <div style={{fontSize:11,color:"#5a5a7a",marginBottom:6,lineHeight:1.5}}>Your monthly spend already reflects where you live. Use the selector as a <em>"what if I lived somewhere else?"</em> scenario tool.</div>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,padding:"8px 10px",background:"#1a1a2e",borderRadius:8}}>
                    <Toggle on={inputs.col_baked_in} onChange={v=>set("col_baked_in")(v)}/>
                    <span style={{fontSize:11,color:"#5a5a7a"}}>My monthly spend already includes my cost of living</span>
                  </div>
                  <div style={{fontSize:10,fontWeight:700,color:"#6a6a8a",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.06em"}}>Select a location to model:</div>
                  {Object.entries(COL).map(([key,v])=>(
                    <button key={key} onClick={()=>set("col_tier")(key)} style={{display:"block",width:"100%",marginBottom:5,padding:"7px 10px",borderRadius:8,border:"1px solid",cursor:"pointer",textAlign:"left",fontFamily:"'DM Sans',sans-serif",transition:"all 0.2s",borderColor:inputs.col_tier===key&&!inputs.col_baked_in?"#4ecdc4":"#2d2d4a",background:inputs.col_tier===key&&!inputs.col_baked_in?"rgba(78,205,196,0.08)":"transparent",opacity:inputs.col_baked_in?0.4:1}}>
                      <div style={{fontSize:11,fontWeight:700,color:inputs.col_tier===key&&!inputs.col_baked_in?"#4ecdc4":"#8a8a8a"}}>{v.label}</div>
                      <div style={{fontSize:10,color:"#4a4a6a"}}>{v.eg}</div>
                    </button>
                  ))}
                </div>
                <div style={{marginBottom:14}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#6a6a8a",letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:4}}>Inflation: {inputs.inflation_rate}%</div>
                  <div style={{fontSize:11,color:"#5a5a7a",marginBottom:8}}>↳ All projections show real (inflation-adjusted) returns</div>
                  <input type="range" min="1" max="6" step="0.5" value={inputs.inflation_rate} onChange={e=>set("inflation_rate")(Number(e.target.value))} style={{accentColor:"#f97316"}}/>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#4a4a6a",marginTop:3}}><span>1% low</span><span>6% high</span></div>
                </div>
                <div style={{marginBottom:14}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#6a6a8a",letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:4}}>Return Scenario</div>
                  <div style={{fontSize:11,color:"#5a5a7a",marginBottom:8}}>↳ Affects FIRE Projection tab &amp; growth chart</div>
                  {["conservative","moderate","optimistic"].map(s=>(
                    <button key={s} onClick={()=>set("return_scenario")(s)} style={{display:"block",width:"100%",marginBottom:5,padding:"7px 10px",borderRadius:8,border:"1px solid",cursor:"pointer",textAlign:"left",fontFamily:"'DM Sans',sans-serif",transition:"all 0.2s",borderColor:inputs.return_scenario===s?"#e8c547":"#2d2d4a",background:inputs.return_scenario===s?"rgba(232,197,71,0.08)":"transparent",color:inputs.return_scenario===s?"#e8c547":"#8a8a8a",fontSize:12,fontWeight:600}}>
                      {s.charAt(0).toUpperCase()+s.slice(1)} ({(HIST[s]*100).toFixed(0)}%/yr)
                    </button>
                  ))}
                  <div style={{fontSize:11,color:"#4a4a6a",marginTop:5}}>💡 Biggest lever — can shift FIRE date 5–8 years</div>
                </div>
                <div>
                  <div style={{fontSize:11,fontWeight:700,color:"#6a6a8a",letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:4}}>Withdrawal Rate: {inputs.withdrawal_rate}%</div>
                  <div style={{fontSize:11,color:"#5a5a7a",marginBottom:8}}>↳ Affects Withdrawal tab only — not your FIRE date</div>
                  <input type="range" min="2" max="6" step="0.5" value={inputs.withdrawal_rate} onChange={e=>set("withdrawal_rate")(Number(e.target.value))} style={{accentColor:"#e8c547"}}/>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#4a4a6a",marginTop:3}}><span>2% safer</span><span>6% riskier</span></div>
                  <div style={{fontSize:11,color:"#4a4a6a",marginTop:5}}>💡 Most FIRE planners use 4%</div>
                </div>
              </Card>
              <button onClick={reset} style={{fontSize:11,color:"#4a4a6a",background:"transparent",border:"1px solid #2d2d4a",borderRadius:8,padding:"7px 14px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",width:"100%"}}>Reset to defaults</button>
            </div>
          </div>

          <div>
            <div style={{marginBottom:22}}>
              <div style={{display:"flex",gap:3,background:"rgba(255,255,255,0.03)",padding:4,borderRadius:12,border:"1px solid rgba(255,255,255,0.06)"}}>
                {TABS.map((tab,i)=>{
                  const active=activeTab===i;
                  const isPic=tab.group==="picture";
                  return(
                    <button key={tab.label} onClick={()=>setTab(i)} style={{flex:1,padding:"8px 4px",borderRadius:8,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,transition:"all 0.2s",fontFamily:"'DM Sans',sans-serif",background:active?(isPic?"#e8c547":"#a78bfa"):"transparent",color:active?"#0d0d1a":isPic?"#6a6a8a":"#5a5a7a",position:"relative"}}>
                      {tab.label}
                      {i===2&&<div style={{position:"absolute",left:-2,top:"25%",bottom:"25%",width:1,background:"rgba(255,255,255,0.08)"}}/>}
                    </button>
                  );
                })}
              </div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:5,padding:"0 4px"}}>
                <span style={{fontSize:10,color:"#2a2a3a",letterSpacing:"0.05em",textTransform:"uppercase"}}>Your picture →</span>
                <span style={{fontSize:10,color:"#2a2a3a",letterSpacing:"0.05em",textTransform:"uppercase"}}>← Go deeper</span>
              </div>
            </div>
            {renderTab()}
          </div>
        </div>

        <div style={{padding:"18px 0",textAlign:"center",fontSize:10,color:"#2a2a3a"}}>
          🔥 FIREstarter · Free forever · For personal planning use only · Not financial advice · Projections use historical averages and do not guarantee future results
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<FireDashboard/>);
</script>
</body>
</html>
